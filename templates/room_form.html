{% extends "base.html" %}
{% block title %}{{ '编辑机房' if room else '新增机房' }}{% endblock %}
{% block content %}

<!-- 页面头部 -->
<div class="rm-header">
    <div class="rm-header-left">
        <a href="{{ url_for('rooms.room_list') }}" class="rm-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div>
            <h1>{{ '编辑机房' if room else '新增机房' }}</h1>
            <span class="rm-subtitle">{{ '修改机房信息' if room else '填写机房基本信息' }}</span>
        </div>
    </div>
</div>

<div class="rm-form-card">
    <div class="rm-form-header">
        <div class="rm-form-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div>
            <h2>机房信息</h2>
            <p>填写机房的基本配置信息</p>
        </div>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="rm-form-body">
            <!-- 基本信息 -->
            <div class="rm-form-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    基本信息
                </h3>
                <div class="rm-form-grid">
                    <div class="form-group rm-form-full">
                        <label class="required">机房名称</label>
                        <input type="text" name="name" class="form-control" value="{{ room.name if room else '' }}" required placeholder="如：A栋主机房">
                    </div>
                    <div class="form-group">
                        <label>楼栋</label>
                        <input type="text" name="building" class="form-control" value="{{ room.building if room else '' }}" placeholder="如：A栋">
                    </div>
                    <div class="form-group">
                        <label>楼层</label>
                        <input type="text" name="floor" class="form-control" value="{{ room.floor if room else '' }}" placeholder="如：1楼">
                    </div>
                </div>
            </div>

            <!-- 位置信息 -->
            <div class="rm-form-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    位置信息
                </h3>
                <div class="rm-form-grid">
                    <div class="form-group rm-form-full">
                        <label>物理位置</label>
                        <input type="text" name="location" class="form-control" value="{{ room.location if room else '' }}" placeholder="如：A栋3楼东侧">
                    </div>
                </div>
            </div>

            <!-- 备注 -->
            <div class="rm-form-section">
                <h3>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    备注信息
                </h3>
                <div class="rm-form-grid">
                    <div class="form-group rm-form-full">
                        <label>备注</label>
                        <textarea name="remark" class="form-control" rows="3" placeholder="机房相关备注信息...">{{ room.remark if room else '' }}</textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 提交按钮 -->
        <div class="rm-form-footer">
            <a href="{{ url_for('rooms.room_list') }}" class="btn btn-outline">取消</a>
            <button type="submit" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
                {{ '保存修改' if room else '创建机房' }}
            </button>
        </div>
    </form>
</div>

<style>
.rm-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
}
.rm-header h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin: 0;
}
.rm-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}
.rm-back {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    transition: var(--transition);
}
.rm-back:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
}
.rm-subtitle {
    font-size: 13px;
    color: var(--text-muted);
}

.rm-form-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    max-width: 700px;
    overflow: hidden;
}

.rm-form-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
}
.rm-form-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(91,94,166,.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.rm-form-icon svg {
    width: 24px;
    height: 24px;
    color: var(--primary);
}
.rm-form-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 4px;
}
.rm-form-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0;
}

.rm-form-body {
    padding: 28px;
}

.rm-form-section {
    margin-bottom: 28px;
}
.rm-form-section:last-child {
    margin-bottom: 0;
}
.rm-form-section h3 {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
}
.rm-form-section h3 svg {
    color: var(--text-muted);
}

.rm-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}
.rm-form-full {
    grid-column: 1 / -1;
}

.rm-form-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    background: var(--bg);
}

@media (max-width: 600px) {
    .rm-form-grid { grid-template-columns: 1fr; }
}
</style>
{% endblock %}
